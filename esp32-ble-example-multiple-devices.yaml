substitutions:
  name: tianpower-bms-ble
  bms0: "device0"
  bms1: "device1"
  device_description: "Monitor two Tianpower Battery Management Systems via BLE"
  external_components_source: github://syssi/esphome-tianpower-bms@main
  bms0_mac_address: !secret bms0_mac_address
  bms1_mac_address: !secret bms1_mac_address

esphome:
  name: ${name}
  friendly_name: ${name}
  comment: ${device_description}
  project:
    name: "syssi.esphome-tianpower-bms"
    version: 2.2.0
  devices:
    - id: device0
      name: "${bms0}"
    - id: device1
      name: "${bms1}"

esp32:
  board: wemos_d1_mini32
  framework:
    type: esp-idf

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  platform: esphome
  on_begin:
    then:
      - switch.turn_off: ble_client_switch0
      - switch.turn_off: ble_client_switch1
      - logger.log: "BLE connection suspended for OTA update"

logger:
  level: DEBUG

# If you don't use Home Assistant please remove this `api` section and uncomment the `mqtt` component!
api:
  reboot_timeout: 0s

# mqtt:
#   broker: !secret mqtt_host
#   username: !secret mqtt_username
#   password: !secret mqtt_password
#   id: mqtt_client

esp32_ble_tracker:
  scan_parameters:
    active: false

ble_client:
  - mac_address: ${bms0_mac_address}
    id: client0
  - mac_address: ${bms1_mac_address}
    id: client1

tianpower_bms_ble:
  - ble_client_id: client0
    id: bms0
    update_interval: 10s
  - ble_client_id: client1
    id: bms1
    update_interval: 10s

